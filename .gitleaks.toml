title = "home-server gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allow documented placeholders and non-secret examples that are intentionally committed."
regexes = [
  '''<PASSWORD>''',
  '''XXXXXXXXXXXXXXXXXX''',
  '''<YOUR_CLOUDFLARE_DNS_API_TOKEN>''',
  '''openweathermapapikey''',
  '''weatherapiapikey''',
  '''change-me-to-a-strong-random-password''',
]
