{{- $dashboard := .Values.dashboard | default dict -}}
{{- $users := required "dashboard.basicAuthUsers is required" (get $dashboard "basicAuthUsers") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dashboard.auth.secretName | quote }}
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
type: Opaque
stringData:
  users: {{ $users | quote }}
