{{- $defaults := .Values.externalRouteDefaults | default dict -}}
{{- range .Values.externalRoutes }}
{{- if or (not (hasKey . "enabled")) .enabled }}
{{- $route := . -}}
{{- $transportName := "" -}}
{{- with $route.transport }}
{{- $transportName = required (printf "externalRoutes[%s].transport.name is required" $route.name) .name -}}
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $route.name | quote }}
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  entryPoints:
{{ toYaml $defaults.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ $route.host }}`)
      kind: Rule
{{- with $route.middlewares }}
      middlewares:
{{- range . }}
        - name: {{ . | quote }}
{{- end }}
{{- end }}
      services:
        - kind: Service
          name: {{ $route.name | quote }}
          passHostHeader: {{ $route.passHostHeader | default $defaults.passHostHeader }}
          port: {{ $route.port }}
          scheme: {{ $route.scheme | default "http" | quote }}
{{- if $transportName }}
          serversTransport: {{ $transportName | quote }}
{{- else if $route.serversTransport }}
          serversTransport: {{ $route.serversTransport | quote }}
{{- end }}
  tls:
    secretName: {{ $defaults.tls.secretName | quote }}
{{- end }}
{{- end }}
