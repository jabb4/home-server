apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: infra
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  entryPoints:
{{ toYaml .Values.dashboard.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.dashboard.host }}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
{{- range .Values.dashboard.middlewares }}
        - name: {{ . | quote }}
{{- end }}
        - name: {{ .Values.dashboard.auth.middlewareName | quote }}
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: {{ .Values.dashboard.tls.secretName | quote }}
