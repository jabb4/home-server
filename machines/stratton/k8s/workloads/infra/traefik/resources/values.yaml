dashboard:
  host: traefik.local.jabbas.dev
  entryPoints:
    - websecure
  middlewares:
    - ui-default
  tls:
    secretName: infra-local-jabbas-dev-tls
  auth:
    middlewareName: traefik-dashboard-auth
    secretName: traefik-dashboard-auth

tlsStore:
  enabled: true
  defaultCertSecretName: infra-local-jabbas-dev-tls

tlsOptions:
  enabled: true
  minVersion: VersionTLS12
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256

sharedMiddlewares:
  crowdsecBouncer:
    enabled: true
    logLevel: INFO
    crowdsecMode: stream
    crowdsecLapiScheme: http
    crowdsecLapiHost: crowdsec-service.crowdsec.svc.cluster.local:8080
    updateIntervalSeconds: 60
    httpTimeoutSeconds: 10
    
  defaultHeaders:
    enabled: true
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 15552000
    customRequestHeaders:
      X-Forwarded-Proto: https

  disallowIFrameEmbedding:
    enabled: true
    frameDeny: true
    customFrameOptionsValue: SAMEORIGIN

  rateLimit:
    enabled: true
    average: 100
    burst: 200

  uiDefault:
    enabled: true
    middlewares:
      - crowdsec-bouncer
      - rate-limit
      - default-headers
      - disallow-iframe-embedding

  piHoleRedirect:
    enabled: true
    regex: "^https://([^/]+)/?$"
    replacement: "https://${1}/admin/"

  authentikForwardAuth:
    enabled: true
    address: http://authentik-upstream-server.infra.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version

clusterRouteDefaults:
  entryPoints:
    - websecure
  tls:
    secretName: infra-local-jabbas-dev-tls
  passHostHeader: true

clusterRoutes:
  - name: argocd
    host: argocd.local.jabbas.dev
    namespace: argocd
    serviceName: argocd-server
    port: 443
    scheme: https
    transport:
      name: argocd-backend
      reference: infra-argocd-backend@kubernetescrd
      insecureSkipVerify: true
    middlewares:
      - ui-internal

  - name: hubble
    host: hubble.local.jabbas.dev
    namespace: kube-system
    serviceName: hubble-ui
    port: 80
    scheme: http
    middlewares:
      - ui-internal

