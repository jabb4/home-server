{{- range .Values.certificates }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name | quote }}
  namespace: {{ .namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  secretName: {{ .secretName | quote }}
  issuerRef:
    name: {{ $.Values.acme.issuerName | quote }}
    kind: ClusterIssuer
  dnsNames:
{{ toYaml .dnsNames | nindent 4 }}
{{- end }}
