{{- $cloudflare := .Values.cloudflare | default dict -}}
{{- $token := required "cloudflare.apiToken is required" (get $cloudflare "apiToken") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cloudflare.secretName | quote }}
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
type: Opaque
stringData:
  {{ .Values.cloudflare.secretKey }}: {{ $token | quote }}
