apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: infra
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.19.2
      helm:
        releaseName: cert-manager
        valueFiles:
          - $values/machines/stratton/k8s/workloads/infra/cert-manager/values.yaml
    - repoURL: https://github.com/jabb4/home-server.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/jabb4/home-server.git
      targetRevision: main
      path: machines/stratton/k8s/workloads/infra/cert-manager/resources
      helm:
        releaseName: cert-manager-resources
        valueFiles:
          - secrets://secrets.sops.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
