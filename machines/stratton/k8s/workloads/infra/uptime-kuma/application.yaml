apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: infra
  source:
    repoURL: https://github.com/jabb4/home-server.git
    targetRevision: main
    path: machines/stratton/k8s/workloads/infra/uptime-kuma
    helm:
      releaseName: uptime-kuma
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
