apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
{{- $generatedSecretName := .Values.secret.name | default "homepage-secrets" -}}
{{- $envSecretName := "" -}}
{{- if .Values.secret.create -}}
{{- $envSecretName = $generatedSecretName -}}
{{- else if .Values.existingSecret -}}
{{- $envSecretName = .Values.existingSecret -}}
{{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      containers:
        - name: homepage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: {{ .Values.allowedHosts | quote }}
          {{- if $envSecretName }}
          envFrom:
            - secretRef:
                name: {{ $envSecretName | quote }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: homepage-config
