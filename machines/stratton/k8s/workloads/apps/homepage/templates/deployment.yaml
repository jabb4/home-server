apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
{{- $generatedSecretName := .Values.secret.name | default "homepage-secrets" -}}
{{- $envSecretName := "" -}}
{{- if .Values.secret.create -}}
{{- $envSecretName = $generatedSecretName -}}
{{- else if .Values.existingSecret -}}
{{- $envSecretName = .Values.existingSecret -}}
{{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secret.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: homepage
    spec:
      containers:
        - name: homepage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: {{ printf "$(MY_POD_IP):3000,%s" .Values.allowedHosts | quote }}
          {{- if $envSecretName }}
          envFrom:
            - secretRef:
                name: {{ $envSecretName | quote }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/custom.css
              subPath: custom.css
              readOnly: true
            - name: config
              mountPath: /app/config/custom.js
              subPath: custom.js
              readOnly: true
            - name: config
              mountPath: /app/config/docker.yaml
              subPath: docker.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/proxmox.yaml
              subPath: proxmox.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true
            - name: logs
              mountPath: /app/config/logs
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: homepage-config
        - name: logs
          emptyDir: {}
