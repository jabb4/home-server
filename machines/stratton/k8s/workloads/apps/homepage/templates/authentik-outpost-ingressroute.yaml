{{- with .Values.ingress.authentikOutpost }}
{{- if .enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-authentik-outpost
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $.Values.ingress.host }}`) && PathPrefix(`{{ .path }}`)
      kind: Rule
      priority: 100
      services:
        - kind: Service
          name: {{ .service.name | quote }}
          namespace: infra
          port: {{ .service.port }}
          scheme: http
  tls: {}
{{- end }}
{{- end }}
