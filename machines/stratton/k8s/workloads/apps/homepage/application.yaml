apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: apps
  source:
    repoURL: https://github.com/jabb4/home-server.git
    targetRevision: main
    path: machines/stratton/k8s/workloads/apps/homepage
    helm:
      releaseName: homepage
      valueFiles:
        - secrets://secrets.sops.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
