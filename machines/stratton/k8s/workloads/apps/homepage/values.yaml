replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.10.1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: infra-ui-default@kubernetescrd,infra-forward-auth-authentik@kubernetescrd
  host: homepage.local.jabbas.dev
  path: /
  pathType: Prefix
  authentikOutpost:
    enabled: true
    path: /outpost.goauthentik.io/
    pathType: Prefix
    service:
      name: authentik-upstream-server
      port: 9000
  tls:
    enabled: true

timezone: Europe/Stockholm
allowedHosts: homepage.local.jabbas.dev

existingSecret: ""

# Use an externally managed Secret instead of the chart-managed one.
# Leave this empty when using the encrypted secrets.sops.yaml flow.
secret:
  create: false
  name: homepage-secrets
  env: {}

resources: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
