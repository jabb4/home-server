# Namespaces managed for cluster workloads.
namespaces:
  - name: longhorn-system
    labels:
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/warn: privileged

  - name: infra
    labels:
      pod-security.kubernetes.io/enforce: restricted
      pod-security.kubernetes.io/audit: restricted
      pod-security.kubernetes.io/warn: restricted

  - name: cert-manager
    labels:
      pod-security.kubernetes.io/enforce: restricted
      pod-security.kubernetes.io/audit: restricted
      pod-security.kubernetes.io/warn: restricted

  - name: apps
    labels:
      pod-security.kubernetes.io/enforce: restricted
      pod-security.kubernetes.io/audit: restricted
      pod-security.kubernetes.io/warn: restricted

# Start with namespace scaffolding only. Enable default-deny when you are
# ready to add explicit allow policies for app traffic.
networkPolicies:
  defaultDeny:
    enabled: false
    namespaces:
      - infra
      - apps

  allowClusterDNS:
    enabled: true

# Argo CD projects create the trust boundary for workload charts.
# Keep source repos and destination namespaces tight instead of using the
# permissive built-in "default" project.
argoProjects:
  - name: root
    description: Root app-of-apps that discovers and creates all child Applications.
    sourceRepos:
      - https://github.com/jabb4/home-server.git
    destinations:
      - server: https://kubernetes.default.svc
        namespace: argocd
    clusterResourceWhitelist: []
    namespaceResourceWhitelist:
      - group: argoproj.io
        kind: Application

  - name: cluster-core
    description: Core cluster controllers and networking managed from Git.
    sourceRepos:
      - https://github.com/jabb4/home-server.git
      - https://helm.cilium.io
      - https://argoproj.github.io/argo-helm
      - https://charts.longhorn.io
    destinations:
      - server: https://kubernetes.default.svc
        namespace: argocd
      - server: https://kubernetes.default.svc
        namespace: kube-system
      - server: https://kubernetes.default.svc
        namespace: longhorn-system
    clusterResourceWhitelist:
      - group: "*"
        kind: "*"
    namespaceResourceWhitelist:
      - group: "*"
        kind: "*"

  - name: foundations
    description: Cluster scaffolding managed from the home-server Git repo.
    sourceRepos:
      - https://github.com/jabb4/home-server.git
    destinations:
      - server: https://kubernetes.default.svc
        namespace: argocd
      - server: https://kubernetes.default.svc
        namespace: apps
      - server: https://kubernetes.default.svc
        namespace: infra
    clusterResourceWhitelist:
      - group: ""
        kind: Namespace
      - group: argoproj.io
        kind: AppProject
    namespaceResourceWhitelist:
      - group: "*"
        kind: "*"

  - name: apps
    description: General user-facing workloads.
    sourceRepos:
      - https://github.com/jabb4/home-server.git
    destinations:
      - server: https://kubernetes.default.svc
        namespace: apps
    clusterResourceWhitelist: []
    namespaceResourceWhitelist:
      - group: "*"
        kind: "*"

  - name: infra
    description: Shared infrastructure services and supporting data stores.
    sourceRepos:
      - https://github.com/jabb4/home-server.git
      - https://charts.jetstack.io
      - https://prometheus-community.github.io/helm-charts
      - https://grafana-community.github.io/helm-charts
      - https://traefik.github.io/charts
      - https://crowdsecurity.github.io/helm-charts
    destinations:
      - server: https://kubernetes.default.svc
        namespace: cert-manager
      - server: https://kubernetes.default.svc
        namespace: apps
      - server: https://kubernetes.default.svc
        namespace: infra
    clusterResourceWhitelist:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
      - group: apiregistration.k8s.io
        kind: APIService
      - group: cert-manager.io
        kind: ClusterIssuer
      - group: networking.k8s.io
        kind: IngressClass
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
    namespaceResourceWhitelist:
      - group: "*"
        kind: "*"
