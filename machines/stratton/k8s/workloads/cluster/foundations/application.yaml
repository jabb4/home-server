apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foundations
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: foundations
  source:
    repoURL: https://github.com/jabb4/home-server.git
    targetRevision: v2
    path: machines/stratton/k8s/workloads/cluster/foundations
    helm:
      releaseName: foundations
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
