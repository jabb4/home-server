{{- if .Values.backups.enabled }}
{{- $credentials := .Values.backupTarget.credentials | default dict -}}
{{- $store := .Values.defaultBackupStore | default dict -}}
{{- $secretName := required "backupTarget.secretName is required when backups.enabled=true" .Values.backupTarget.secretName -}}
{{- $backupTarget := required "defaultBackupStore.backupTarget is required when backups.enabled=true" (get $store "backupTarget") -}}
{{- $accessKeyId := required "backupTarget.credentials.accessKeyId is required when backups.enabled=true" (get $credentials "accessKeyId") -}}
{{- $secretAccessKey := required "backupTarget.credentials.secretAccessKey is required when backups.enabled=true" (get $credentials "secretAccessKey") -}}
{{- $endpoint := required "backupTarget.credentials.endpoint is required when backups.enabled=true" (get $credentials "endpoint") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ $accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $secretAccessKey | quote }}
  AWS_ENDPOINTS: {{ $endpoint | quote }}
  {{- if (get $credentials "virtualHostedStyle") }}
  VIRTUAL_HOSTED_STYLE: "true"
  {{- end }}
  {{- with (get $credentials "cert") }}
  AWS_CERT: |
{{ . | nindent 4 }}
  {{- end }}
{{- end }}
