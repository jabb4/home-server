{{- $encryption := .Values.encryption | default dict -}}
{{- if $encryption.enabled }}
{{- $secretName := required "encryption.secretName is required when encryption.enabled=true" (get $encryption "secretName") -}}
{{- $keyValue := required "encryption.globalKey.value is required when encryption.enabled=true" (dig "globalKey" "value" "" $encryption) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
type: Opaque
stringData:
  CRYPTO_KEY_VALUE: {{ $keyValue | quote }}
  CRYPTO_KEY_PROVIDER: "secret"
  CRYPTO_KEY_CIPHER: {{ $encryption.cipher | quote }}
  CRYPTO_KEY_HASH: {{ $encryption.hash | quote }}
  CRYPTO_KEY_SIZE: {{ $encryption.keySize | quote }}
  CRYPTO_PBKDF: {{ $encryption.pbkdf | quote }}
{{- end }}
