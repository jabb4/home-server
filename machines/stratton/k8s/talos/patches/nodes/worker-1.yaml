apiVersion: v1alpha1
kind: HostnameConfig
hostname: worker-1
auto: off
---
machine:
  kubelet:
    extraMounts:
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: longhorn
volumeType: disk
provisioning:
  diskSelector:
    match: !system_disk && disk.size > 150u * GiB
