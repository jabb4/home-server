services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:10.11.8@sha256:7351868a3a340049503d25da65fae19c77ce3ea58f607f702cac65b6faeec898
    restart: unless-stopped

    # Networking
    ports:
      - 8096:8096 # HTTP

    # Filesystem
    volumes:
      - jellyfin_config:/config
      - /mnt/data/media/tv:/data/tvshows
      - /mnt/data/media/movies:/data/movies
    
    # Security
    security_opt:
      - no-new-privileges:true  # forbid privilege escalation

    # Environment
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TIMEZONE:-Europe/Stockholm}

volumes:
  jellyfin_config: